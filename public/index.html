<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Contact Crawler Pro</title>
  <style>
    body {
      font-family: Arial;
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }

    button {
      cursor: pointer;
    }

    pre {
      margin-top: 20px;
      background: #f4f4f4;
      padding: 15px;
      white-space: pre-wrap;
    }

    .title {
      font-size: 22px;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

<div class="title">🌐 Contact Crawler Pro</div>

<select id="mode">
  <option value="all">All</option>
  <option value="emails">Emails only</option>
  <option value="phones">Phones only</option>
  <option value="sites">Sites only</option>
</select>

<input id="url" placeholder="Enter website URL (https://...)" />

<button onclick="crawl()">Start Crawl</button>

<pre id="output">Waiting...</pre>

<script>
const API = "https://cf-email-decoder.onrender.com/crawl";

async function crawl() {
    const url = document.getElementById("url").value;
    const mode = document.getElementById("mode").value;
    const out = document.getElementById("output");

    out.textContent = "Crawling...";

    try {
        const res = await fetch(API, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ url, mode })
        });

        const data = await res.json();

        out.textContent =
`Pages crawled:
${(data.pages || []).join("\n")}

Emails:
${(data.emails || []).join("\n") || "None"}

Phones:
${(data.phones || []).join("\n") || "None"}

Sites:
${(data.sites || []).join("\n") || "None"}
`;

    } catch (e) {
        out.textContent = "Error contacting backend.";
    }
}
</script>

<button onclick="download()">⬇ Export JSON</button>

<script>
function download() {
    if (!window.lastData) return;

    const blob = new Blob(
        [JSON.stringify(window.lastData, null, 2)],
        { type: "application/json" }
    );

    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "crawl-result.json";
    a.click();
}
</script>

        function gtag() {
            dataLayer.push(arguments);
        }
        gtag('js', new Date());

        gtag('config', 'G-9FWQFZME3Z');
    </script>

</body>
</html>
