<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Contact Crawler Dashboard</title>
  <style>
    body {
      font-family: Arial;
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    input, button {
      padding: 10px;
      width: 100%;
      margin-top: 10px;
    }

    button {
      cursor: pointer;
    }

    .box {
      margin-top: 20px;
      background: #f4f4f4;
      padding: 15px;
      white-space: pre-wrap;
    }

    .history {
      margin-top: 20px;
    }

    .history button {
      width: auto;
      margin-right: 5px;
    }
  </style>
</head>
<body>

<h1>🌐 Contact Crawler Dashboard</h1>

<input id="url" placeholder="Enter website URL (https://...)" />
<input id="depth" placeholder="Crawl depth (default 1)" />

<button onclick="crawl()">Start Crawl</button>

<div class="history">
  <h3>History</h3>
  <div id="history"></div>
</div>

<div class="box" id="output">Waiting...</div>

<script>
const API = "https://cf-email-decoder.onrender.com/crawl";

let history = [];

function saveHistory(entry) {
    history.unshift(entry);
    if (history.length > 5) history.pop();

    document.getElementById("history").innerHTML =
        history.map((h, i) =>
            `<button onclick="load(${i})">${h.url}</button>`
        ).join("");
}

function load(i) {
    document.getElementById("url").value = history[i].url;
}

async function crawl() {
    const url = document.getElementById("url").value;
    const depth = document.getElementById("depth").value || 1;
    const out = document.getElementById("output");

    out.textContent = "Crawling...";

    const res = await fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url, depth })
    });

    const data = await res.json();

    saveHistory({ url, data });

    out.textContent =
`Pages crawled:
${data.pages.join("\n")}

Emails:
${data.emails.join("\n") || "None"}

Cloudflare Emails:
${data.cloudflare.join("\n") || "None"}

Phones:
${data.phones.join("\n") || "None"}
`;

// export JSON button
    window.lastData = data;
}
</script>

<button onclick="download()">⬇ Export JSON</button>

<script>
function download() {
    if (!window.lastData) return;

    const blob = new Blob(
        [JSON.stringify(window.lastData, null, 2)],
        { type: "application/json" }
    );

    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "crawl-result.json";
    a.click();
}
</script>

</body>
</html>
