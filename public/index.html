<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cloudflare Email Extractor</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 50px auto;
      padding: 20px;
    }

    h1 {
      font-size: 22px;
    }

    input {
      width: 100%;
      padding: 10px;
      font-size: 14px;
      margin-top: 10px;
    }

    button {
      margin-top: 10px;
      padding: 10px 15px;
      cursor: pointer;
    }

    pre {
      margin-top: 20px;
      background: #f4f4f4;
      padding: 15px;
      white-space: pre-wrap;
    }

    .hint {
      font-size: 12px;
      color: gray;
      margin-top: 5px;
    }
  </style>
</head>
<body>

<h1>🔍 Cloudflare Email Extractor</h1>

<p>Enter a URL to extract obfuscated Cloudflare emails:</p>

<input id="url" placeholder="https://example.com" />

<div class="hint">
  Backend: https://cf-email-decoder.onrender.com
</div>

<button onclick="extract()">Extract Emails</button>

<pre id="output">Waiting...</pre>

<script>
const API_URL = "https://cf-email-decoder.onrender.com/extract";

async function extract() {
    const url = document.getElementById("url").value.trim();
    const out = document.getElementById("output");

    if (!url) {
        out.textContent = "Please enter a URL.";
        return;
    }

    out.textContent = "Loading...";

    try {
        const res = await fetch(API_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ url })
        });

        const data = await res.json();

        if (data.error) {
            out.textContent = "Error: " + data.error;
            return;
        }

        if (!data.emails || data.emails.length === 0) {
            out.textContent = "No Cloudflare emails found.";
            return;
        }

        out.textContent = "Found emails:\n\n" + data.emails.join("\n");

    } catch (err) {
        out.textContent = "Failed to connect to backend.";
    }
}
</script>

</body>
</html>
